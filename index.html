<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row button {
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #5a67d8; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    li:hover { background: #f7fafc; }

    li + li { border-top: 1px solid #edf2f7; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    li .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      background: none;
      border: 1.5px solid #fed7d7;
      color: #e53e3e;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>
    <ul id="list"></ul>
    <div class="empty" id="empty">아직 아이템이 없어요. 위에서 추가해보세요!</div>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" style="display:none">
      체크된 항목 삭제
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://fgpsrvwkbbtywqivrhsr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZncHNydndrYmJ0eXdxaXZyaHNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MjYzMTUsImV4cCI6MjA5NjIwMjMxNX0.lFFzp7m0TsqYsX-i31m1May-etpz5Nqt6ht2qLrKPDE';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    const input    = document.getElementById('itemInput');
    const listEl   = document.getElementById('list');
    const emptyEl  = document.getElementById('empty');
    const statsEl  = document.getElementById('stats');
    const clearBtn = document.getElementById('clearBtn');

    function render() {
      listEl.innerHTML = '';
      const total   = items.length;
      const checked = items.filter(i => i.done).length;

      emptyEl.style.display  = total === 0 ? 'block' : 'none';
      clearBtn.style.display = checked > 0 ? 'block' : 'none';
      statsEl.textContent    = total > 0 ? `${checked} / ${total} 완료` : '';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type    = 'checkbox';
        cb.checked = item.done;
        cb.addEventListener('change', () => toggleItem(item.id, cb.checked));

        const span = document.createElement('span');
        span.className   = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className   = 'delete-btn';
        del.textContent = '✕';
        del.title       = '삭제';
        del.addEventListener('click', () => deleteItem(item.id));

        li.append(cb, span, del);
        listEl.appendChild(li);
      });
    }

    async function loadItems() {
      statsEl.textContent = '불러오는 중...';
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) { console.error(error); return; }
      items = data;
      render();
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      input.value = '';
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();
      if (error) { console.error(error); return; }
      items.unshift(data);
      render();
      input.focus();
    }

    async function toggleItem(id, done) {
      const { error } = await db
        .from('shopping_items')
        .update({ done })
        .eq('id', id);
      if (error) { console.error(error); return; }
      const target = items.find(i => i.id === id);
      if (target) target.done = done;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (error) { console.error(error); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('done', true);
      if (error) { console.error(error); return; }
      items = items.filter(i => !i.done);
      render();
    }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    loadItems();
  </script>
</body>
</html>
